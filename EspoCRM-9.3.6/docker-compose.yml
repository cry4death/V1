# EspoCRM 9.3.6 — полный стек в Docker: Nginx + PHP-FPM 8.3 + MySQL 8.0
# Если MySQL уже установлен на ПК, проще без Docker: tools\Start-Local.ps1
#
# Docker Desktop: https://www.docker.com/products/docker-desktop/
#
# Запуск из этой папки (EspoCRM-9.3.6):
#   docker compose up -d
# Откройте: http://localhost:8080/install/
#
# БД для мастера установки:
#   Хост: db
#   Порт: 3306 (с хоста тоже 3306)
#   Имя БД: espocrm
#   Пользователь: espocrm
#   Пароль: espocrm
#   Site URL: http://localhost:8080

services:
  db:
    image: mysql:8.0
    container_name: espocrm-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: espocrm
      MYSQL_USER: espocrm
      MYSQL_PASSWORD: espocrm
    volumes:
      - espocrm_mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: espocrm-php
    volumes:
      - .:/var/www/html
    working_dir: /var/www/html
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: espocrm-nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/espocrm.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  espocrm_mysql_data:
