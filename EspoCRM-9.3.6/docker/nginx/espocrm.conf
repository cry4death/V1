server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php;
    client_max_body_size 50M;

    location /client/ {
        alias /var/www/html/client/;
        access_log off;
        expires 7d;
    }

    location ~* ^/api/v1/portal-access/ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/api/v1/portal-access/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 600;
    }

    location ~* ^/api/v1/ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/api/v1/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 600;
    }

    location ~* ^/portal/ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/portal/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_read_timeout 600;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 600;
    }

    location ~ /\. {
        deny all;
    }
}
