name: flutter_application_diplom
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.4
  google_fonts: ^8.0.2
  smooth_page_indicator: ^2.0.1

  # Navigation
  go_router: ^17.2.0

  # State management
  flutter_riverpod: ^2.6.1

  # Networking (Laravel API)
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.2

  # Notifications (Firebase Cloud Messaging + local)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1

  # Misc
  intl: any
  flutter_html: ^3.0.0
  html: ^0.15.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
